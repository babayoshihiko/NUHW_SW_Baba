project:
  type: website
  # サイトのURLパスを正確に指定
  output-dir: _site

website:
  title: "NUHW_SW_Baba"
  # site-url を含め、最後のスラッシュまで正しく設定
  site-url: "https://babayoshihiko.github.io/NUHW_SW_Baba/"

  navbar:
    background: "#f8dfe7"
    pinned: true
    collapse-below: sm
    left:
      - text: "Home"
        href: index.qmd
      - text: "Research"
        href: research.qmd
      - text: "Software"
        href: software.qmd
    right:
      - text: "Language"
        menu:
          - text: "日本語"
            href: /ja/
          - text: "English"
            href: /en/

format:
  html:
    theme: cosmo
    toc: true
    include-in-header:
      - text: |
          <link rel="stylesheet" href="/assets/lang.css">
          <script src="/assets/lang.js"></script>
    include-after-body: header.html
